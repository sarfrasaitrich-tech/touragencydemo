<!DOCTYPE html>
<html>
<head>
  <title>Add Tour</title>
</head>
<body bgcolor="#E6E6FA">

  <!-- Header Section -->
  <header>
    <center>
      <h2>Add Tour</h2>
      <p>Create a memorable travel experience</p>
    </center>
  </header>

  <!-- Main Content Section -->
  <section>
    <center>
      <article>
        <form>
          <table border="0" cellpadding="8" cellspacing="5" bgcolor="white">

            <tr>
              <td><b>Tour Title *</b></td>
              <td><input type="text" name="title" placeholder="e.g., Amazing Kerala Backwaters Tour" size="40"></td>
            </tr>

            <tr>
              <td><b>Description *</b></td>
              <td><textarea name="description" rows="4" cols="42" placeholder="Describe the tour highlights, activities, and what makes it special..."></textarea></td>
            </tr>

            <tr>
              <td><b>Destination *</b></td>
              <td>
                <select name="destination">
                  <option value="">Select destination</option>
                  <option value="Kerala">Kerala</option>
                  <option value="Goa">Goa</option>
                  <option value="Manali">Manali</option>
                  <option value="Kashmir">Kashmir</option>
                </select>
              </td>
            </tr>

            <tr>
              <td><b>Number of Nights *</b></td>
              <td><input type="number" name="nights" min="1" max="30"></td>
            </tr>

            <tr>
              <td><b>Price (USD) *</b></td>
              <td><input type="number" name="price" placeholder="0" min="0"></td>
            </tr>

            <tr>
              <td><b>Departure Date *</b></td>
              <td><input type="date" name="departure"></td>
            </tr>

            <tr>
              <td><b>Arrival Date</b></td>
              <td><input type="date" name="arrival"></td>
            </tr>

            <tr align="center">
              <td colspan="2">
                <input type="submit" value="Create Tour">
                &nbsp;&nbsp;
                <input type="reset" value="Cancel">
              </td>
            </tr>

          </table>
        </form>
      </article>
    </center>
  </section>

  <!-- Footer Section -->
  <footer>
  <table width="100%" bgcolor="#002147" cellpadding="10">
    <tr>
      <td align="center">
        <font color="white" size="3">
          <img src="Images/flight.PNG" alt=""> Plan your next adventure with <b>DreamTour Travels</b> — Explore. Experience. Enjoy. <img src="Images/worldd.PNG" alt="">
        </font>
      </td>
    </tr>
    <tr>
      <td align="center">
        <!-- Social Media Icons -->
        
          <img src="Images/fb.PNG" alt="Facebook" width="30" style="margin:0 5px;">
        </a>
        
          <img src="Images/insta.PNG" alt="Instagram" width="30" style="margin:0 5px;">
        </a>
        
          <img src="Images/twitter.PNG" alt="Twitter" width="30" style="margin:0 5px;">
        </a>
      </td>
    </tr>
    <tr>
      <td align="center">
        <font color="white" size="2">
         &copy; 2025 DreamTour Travels. All rights reserved.
        </font>
      </td>
    </tr>
  </table>
</footer>


</body>
</html>
